spring:
  datasource:
    url: ${LAB1_DB_URL:jdbc:postgresql://localhost:5432/lab1}
    username: ${LAB1_DB_USERNAME:postgres}
    password: ${LAB1_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
